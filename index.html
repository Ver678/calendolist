<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kalendar s to-do listom za upravljanje dnevnim zadacima" />
  <title>Moj Kalendar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <header class="app-header">
      <h1>🌸 Moj Kalendar</h1>
    </header>

    <section class="calendar-section">
      <div class="calendar-top">
        <button class="nav-btn" id="prevMonth" type="button" aria-label="Prethodni mjesec">&#10094;</button>
        <h2 id="monthYear">Ožujak 2026</h2>
        <button class="nav-btn" id="nextMonth" type="button" aria-label="Sljedeći mjesec">&#10095;</button>
      </div>

      <div class="weekdays" role="row">
        <div>Pon</div><div>Uto</div><div>Sri</div>
        <div>Čet</div><div>Pet</div><div>Sub</div><div>Ned</div>
      </div>

      <div class="calendar-days" id="calendarDays"></div>

      <p class="calendar-info">Klikni na datum za pregled ili dodavanje zadataka</p>
    </section>

    <section class="tasks-section">
      <div class="tasks-header">
        <div>
          <h2 id="selectedDateTitle">Odaberi datum</h2>
          <p id="taskCount" aria-live="polite">0 zadataka</p>
        </div>
      </div>

ona crta progressa
      <div class="progress-wrap" id="progressWrap" style="display:none">
        <div class="progress-bar" id="progressBar"></div>
        <span class="progress-label" id="progressLabel">0 / 0</span>
      </div>

      <div class="task-list" id="taskList">
        <p class="empty-message">Nema zadataka za ovaj dan.</p>
      </div>

      <button class="add-task-btn" id="openModal" type="button" aria-label="Dodaj zadatak">+</button>
    </section>

 Modal
    <div class="modal hidden" id="taskModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modalTitle">Dodaj zadatak</h3>
          <button class="close-btn" id="closeModal" type="button" aria-label="Zatvori modal">&times;</button>
        </div>

        <input
          type="text"
          id="taskInput"
          placeholder="Što trebaš napraviti?"
          aria-label="Naziv zadatka"
          autocomplete="off"
        />

        <!-- Prioritet -->
        <div class="priority-select">
          <button class="priority-btn active" data-priority="low" type="button">🟢 Nisko</button>
          <button class="priority-btn" data-priority="medium" type="button">🟡 Srednje</button>
          <button class="priority-btn" data-priority="high" type="button">🔴 Hitno</button>
        </div>

        <button class="submit-task-btn" id="addTaskBtn" type="button">Dodaj zadatak</button>
      </div>
    </div>

    <!-- Toast notifikacija -->
    <div class="toast hidden" id="toast"></div>

  </div>

  <noscript>Ova aplikacija zahtijeva JavaScript za rad.</noscript>
  <script src="script.js"></script>
</body>
</html>
